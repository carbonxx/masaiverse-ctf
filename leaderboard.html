<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MasaiVerse CTF | Leaderboard</title>
    <style>
        :root {
            --primary: #00f572;
            --bg-dark: #09090b;
            --card-dark: #18181b;
            --border-color: rgba(0, 245, 114, 0.2);
            --gold: #fbbf24;
            --silver: #9ca3af;
            --bronze: #b45309;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Ambient background glow */
        body::before {
            content: '';
            position: fixed;
            top: 50%;
            left: 50%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(0, 245, 114, 0.05) 0%, rgba(9, 9, 11, 0) 70%);
            transform: translate(-50%, -50%);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 4rem 2rem;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin: 0 0 1rem 0;
            letter-spacing: -1px;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: #a1a1aa;
            font-size: 1.1rem;
            font-family: monospace;
        }

        .leaderboard-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .player-card {
            background: rgba(24, 24, 27, 0.7);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(10px);
            transition: transform 0.2s, box-shadow 0.2s;
            animation: slideUp 0.5s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .player-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 245, 114, 0.1);
            border-color: rgba(0, 245, 114, 0.5);
        }

        .rank-info {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .rank-number {
            font-size: 1.5rem;
            font-weight: 900;
            width: 40px;
            text-align: center;
            color: #52525b;
        }

        .player-card[data-rank="1"] .rank-number { color: var(--gold); text-shadow: 0 0 10px rgba(251, 191, 36, 0.5); }
        .player-card[data-rank="2"] .rank-number { color: var(--silver); text-shadow: 0 0 10px rgba(156, 163, 175, 0.5); }
        .player-card[data-rank="3"] .rank-number { color: var(--bronze); text-shadow: 0 0 10px rgba(180, 83, 9, 0.5); }

        .player-name {
            font-size: 1.25rem;
            font-weight: 600;
            color: #e4e4e7;
        }

        .player-time {
            font-family: monospace;
            font-size: 1.2rem;
            color: var(--primary);
            background: rgba(0, 245, 114, 0.1);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            border: 1px solid rgba(0, 245, 114, 0.2);
        }

        .empty-state {
            text-align: center;
            padding: 4rem;
            color: #71717a;
            font-family: monospace;
            border: 1px dashed #3f3f46;
            border-radius: 12px;
        }

        .actions {
            margin-top: 3rem;
            text-align: center;
        }

        .btn {
            display: inline-block;
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 0.75rem 2rem;
            font-size: 1rem;
            font-family: monospace;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: var(--primary);
            color: black;
            box-shadow: 0 0 20px rgba(0, 245, 114, 0.4);
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Global Standings</h1>
            <p class="subtitle">MasaiVerse CTF // Secure Database</p>
        </header>

        <div id="leaderboard" class="leaderboard-list">
            <!-- Cards populated by JS -->
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const leaderboardContainer = document.getElementById('leaderboard');
            let lb = [];
            
            try {
                const response = await fetch('/api/leaderboard');
                lb = await response.json();
            } catch (e) {
                console.error("Failed to load leaderboard API", e);
            }

            if (!lb || lb.length === 0) {
                leaderboardContainer.innerHTML = `<div class="empty-state">No agents have breached the system yet. Be the first.</div>`;
                return;
            }

            // Ensure sorted
            lb.sort((a,b) => a.timeMs - b.timeMs);

            lb.forEach((player, index) => {
                const rank = index + 1;
                const card = document.createElement('div');
                card.className = 'player-card';
                card.setAttribute('data-rank', rank);
                card.style.animationDelay = `${index * 0.1}s`;
                
                let rankDisplay = `#${rank}`;
                if (rank === 1) rankDisplay = '🥇';
                if (rank === 2) rankDisplay = '🥈';
                if (rank === 3) rankDisplay = '🥉';

                card.innerHTML = `
                    <div class="rank-info">
                        <div class="rank-number">${rankDisplay}</div>
                        <div class="player-name">${player.name}</div>
                    </div>
                    <div class="player-time">${player.timeFormatted}</div>
                `;
                
                leaderboardContainer.appendChild(card);
            });
        });
    </script>
</body>
</html>
